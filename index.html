async function doYTUpload() {
  if (!ytAccessToken) { showToast('е…ҲгҒ«GoogleгӮўгӮ«гӮҰгғігғҲгҒ§иӘҚиЁјгҒ—гҒҰгҒҸгҒ гҒ•гҒ„'); return; }
  if (!exportedBlob) { showToast('е…ҲгҒ«еӢ•з”»гӮ’гӮЁгӮҜгӮ№гғқгҒEгғҲгҒ—гҒҰгҒҸгҒ гҒ•гҒ„'); return; }

  var title = (document.getElementById('ytTitle').value || 'жӯҢи©һеӢ•з”»').trim();
  var desc  = (document.getElementById('ytDesc').value || '').trim();
  var tagsRaw = (document.getElementById('ytTags').value || '').trim();
  var privacy  = document.getElementById('ytPrivacy').value;
  var category = document.getElementById('ytCategory').value;
  var tags = tagsRaw ? tagsRaw.split(',').map(function(t){return t.trim();}).filter(Boolean) : [];

  document.getElementById('ytProgWrap').style.display = 'block';
  document.getElementById('ytUploadBtn').disabled = true;
  document.getElementById('ytSuccessMsg').style.display = 'none';

  var metadata = {
    snippet: { title: title, description: desc, tags: tags, categoryId: category },
    status: { privacyStatus: privacy }
  };

  try {
    _ytStatus('рҹ“Ө гӮўгғҒEҒEгғӯгғјгғүеҒEжңҹеҢ–дёӯ...'); _ytProg(5);

    // content.googleapis.com гҒҜгғ–гғ©гӮҰгӮ¶зӣҙжҺҘгӮўгғҒEҒEгғӯгғјгғүз”ЁгҒ®CORSеҜҫеҝңгӮЁгғігғүгҒEгӮӨгғігғҒE
    var uploadUrl = await fetch(
      'https://www.googleapis.com/upload/youtube/v3/videos?uploadType=resumable&part=snippet,status',
      {
        method: 'POST',
        mode: 'cors',
        credentials: 'omit',
        headers: {
          'Authorization': 'Bearer ' + ytAccessToken,
          'Content-Type': 'application/json; charset=UTF-8',
          'X-Upload-Content-Type': exportedBlob.type || 'video/webm',
          'X-Upload-Content-Length': String(exportedBlob.size)
        },
        body: JSON.stringify(metadata)
      }
    ).then(function(res) {
      if (!res.ok) return res.text().then(function(t){ throw new Error('еҲқжңҹеҢ–гӮЁгғ©гғј HTTP ' + res.status + ': ' + t.substring(0,300)); });
      var loc = res.headers.get('Location') || res.headers.get('location');
      if (!loc) throw new Error('Location гғҳгғғгғҖгғјгҒҢиҰӢгҒӨгҒӢгӮҠгҒҫгҒӣгӮ“гҒ§гҒ—гҒҹ (status=' + res.status + ')');
      return loc;
    }).catch(function(e) {
      // fetchеӨұж•—жҷӮгҒҜXHRгҒ§гғӘгғҲгғ©гӮӨ
      return new Promise(function(resolve, reject) {
        var xhr = new XMLHttpRequest();
        xhr.open('POST', 'https://www.googleapis.com/upload/youtube/v3/videos?uploadType=resumable&part=snippet,status', true);
        xhr.setRequestHeader('Authorization', 'Bearer ' + ytAccessToken);
        xhr.setRequestHeader('Content-Type', 'application/json; charset=UTF-8');
        xhr.onload = function() {
          if (xhr.status >= 200 && xhr.status < 300) {
            var loc = xhr.getResponseHeader('Location') || xhr.getResponseHeader('location');
            if (loc) resolve(loc);
            else reject(new Error('Location гғҳгғғгғҖгғјгҒӘгҒҒE(status=' + xhr.status + ')'));
          } else {
            reject(new Error('еҲқжңҹеҢ–гӮЁгғ©гғј HTTP ' + xhr.status + ': ' + xhr.responseText.substring(0, 300)));
          }
        };
        xhr.onerror = function() {
          reject(new Error('CORS/гғҚгғғгғҲгғҜгғјгӮҜгӮЁгғ©гғјгҖӮгӮ·гғјгӮҜгғ¬гғҒEғҲгғўгғјгғүгҒ§и©ҰгҒҷгҒӢгҖҒGoogle Cloud ConsoleгҒ§JavaScriptз”ҹжҒEе…ҒEӮ’иҝҪеҠ гҒ—гҒҰгҒҸгҒ гҒ•гҒ„: ' + window.location.origin));
        };
        xhr.send(JSON.stringify(metadata));
      });
    });

    if (!uploadUrl) throw new Error('гӮўгғҒEҒEгғӯгғјгғүURLгӮ’еҸ–еҫ—гҒ§гҒҚгҒҫгҒӣгӮ“гҒ§гҒ—гҒҹ');

    _ytStatus('рҹ“Ў еӢ•з”»гғҒEҒEгӮҝйҖҒдҝЎдёӯ...'); _ytProg(10);
    var videoId = await _ytUploadWithProgress(uploadUrl, exportedBlob);

    _ytProg(92); _ytStatus('рҹ–ј гӮөгғ гғҚгӮӨгғ«гӮ’гӮўгғҒEҒEгғӯгғјгғүдёӯ...');
    if (thumbnailDataUrl && videoId) {
      try { await _ytUploadThumbnail(videoId); } catch(e) { console.warn('Thumbnail failed:', e); }
    }

    _ytProg(100);
    var videoUrl = 'https://youtu.be/' + videoId;
    var succ = document.getElementById('ytSuccessMsg');
    succ.style.display = 'block';
    succ.innerHTML = 'вңҒEгӮўгғҒEҒEгғӯгғјгғүе®ҢдәҒEјҒEbr><br>'
      + '<a href="' + videoUrl + '" target="_blank" rel="noopener" style="color:var(--accent2);font-family:\'Space Mono\',monospace;font-size:12px;word-break:break-all">' + videoUrl + '</a><br><br>'
      + '<button class="btn btn-primary" onclick="window.open(\'' + videoUrl + '\',\'_blank\',\'noopener\')">YouTubeгҒ§й–ӢгҒҸ</button>';
    document.getElementById('ytProgWrap').style.display = 'none';
    showToast('вңҒEYouTubeгҒ«гӮўгғҒEҒEгғӯгғјгғүгҒ—гҒҫгҒ—гҒҹҒEҒE);

  } catch(err) {
    console.error('YT upload error:', err);
    _ytStatus('вқҒE' + err.message);
    document.getElementById('ytUploadBtn').disabled = false;
    showToast('вқҒEгӮўгғҒEҒEгғӯгғјгғүеӨұж•ҒE);
  }
}

function _ytUploadWithProgress(uploadUrl, blob) {
  return new Promise(function(resolve, reject) {
    var xhr = new XMLHttpRequest();
    xhr.open('PUT', uploadUrl, true);
    xhr.setRequestHeader('Content-Type', blob.type || 'video/webm');
    xhr.upload.onprogress = function(e) {
      if (e.lengthComputable) {
        var pct = 10 + Math.round((e.loaded / e.total) * 80);
        _ytProg(pct);
        _ytStatus('рҹ“Ў гӮўгғҒEҒEгғӯгғјгғүдёӯ... ' + Math.round(e.loaded / e.total * 100) + '%  (' + _fmtBytes(e.loaded) + ' / ' + _fmtBytes(e.total) + ')');
      }
    };
    xhr.onload = function() {
      if (xhr.status >= 200 && xhr.status < 300) {
        try { resolve(JSON.parse(xhr.responseText).id); }
        catch(e) { reject(new Error('гғ¬гӮ№гғқгғігӮ№и§ЈжһҗеӨұж•ҒE)); }
      } else {
        reject(new Error('HTTP ' + xhr.status + ': ' + xhr.responseText.substring(0, 200)));
      }
    };
    xhr.onerror = function() { reject(new Error('гғҚгғғгғҲгғҜгғјгӮҜгӮЁгғ©гғј')); };
    xhr.send(blob);
  });
}

}

async function autoTimecodesGroq() {
  if (!audioFile) {
    alert("йҹіжәҗгӮ’гӮўгғҒEҒEгғӯгғјгғүгҒ—гҒҰгҒҸгҒ гҒ•гҒ„");

  const origText = btn.textContent;
  btn.textContent = "вҸі и§Јжһҗдёӯ...";
  btn.disabled = true;

  try {
    const formData = new FormData();
    formData.append("audio", audioFile);

    const res = await fetch("/api/transcribe", {
      method: "POST",
      body: formData,
    });

    const data = await res.json();

    if (!res.ok || data.error) {
      alert("гӮЁгғ©гғј: " + (data.error || res.statusText));
      return;
    }

    applyTimecodesFromSegments(data.segments);
  } catch (e) {
    alert("йҖҡдҝЎгӮЁгғ©гғј: " + e.message);
  } finally {
    btn.textContent = origText;
    btn.disabled = false;
  }
}

function applyTimecodesFromSegments(segments) {
  if (!segments || segments.length === 0) return;

  const lines = document
    .getElementById("lyricsInput")
    .value.split("\n")
    .filter((l) => l.trim() !== "");

  let tcList = [];

  lines.forEach((line, i) => {
    const seg = segments[i] || segments[segments.length - 1];

    tcList.push({
      text: line,
      time: seg.start,
    });
  });

  applyTimecodesToUI(tcList);
}

function applyTimecodesToUI(tcList) {
  tcList.forEach((tc, i) => {
    timecodes[i] = tc.time;
  });

  renderTcList();
}
